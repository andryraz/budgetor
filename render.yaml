services:
  - type: web
    name: posu-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: JWT_SECRET
        sync: false        # à saisir manuellement dans le dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false        # à saisir manuellement dans le dashboard
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
